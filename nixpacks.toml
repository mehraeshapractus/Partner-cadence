providers = ["python", "node"]

[phases.install]
cmds = [
  "python3 -m venv .venv",
  ".venv/bin/pip install -r backend/requirements.txt",
  "npm --prefix frontend ci"
]

[phases.build]
cmds = ["npm --prefix frontend run build"]

[start]
cmd = "cd backend && ../.venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
