providers = ["python", "node"]

[phases.install]
cmds = [
  "python3 -c \"import urllib.request; urllib.request.urlretrieve('https://bootstrap.pypa.io/get-pip.py', '/tmp/get-pip.py')\" && python3 /tmp/get-pip.py --quiet",
  "pip install -r backend/requirements.txt",
  "npm --prefix frontend ci"
]

[phases.build]
cmds = ["npm --prefix frontend run build"]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
